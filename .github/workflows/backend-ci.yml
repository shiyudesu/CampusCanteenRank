name: backend-ci

on:
  push:
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"
      - "go.work"
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"
      - "go.work"

jobs:
  test-vet-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: |
            server/go.sum

      - name: Go test
        run: go test ./server/...

      - name: Go vet
        run: go vet ./server/...

      - name: Go build
        run: go build ./server/...
